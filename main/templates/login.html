{% load static %}

<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>
    <link rel="stylesheet" href="{% static 'css/login.css'%}">
</head>


<body>

<div class="login-container">

    <h2>Login</h>
    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        </div>

    {% endif %}


    <form method="POST">
        {% csrf_token %}
        <div class="input-group">
            <label>Username</label>
            <input 
                type="text"
                name="username"
                placeholder="Digite seu username"
                required>
        </div>

        <div class="input-group">
            <label>Senha</label>
            <input 
                type="password"
                name="password"
                placeholder="Digite sua senha"
                required>
        </div>
        <button type="submit">
            Entrar
        </button>
    </form>
</div>
</body>


</html>
